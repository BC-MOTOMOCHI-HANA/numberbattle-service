<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //
        function _log(valiable) {
            console.log(valiable);
        }

        //足し算
        function add(a, b) {
            const n = a + b;
            console.log(n);
        }

        //引き算
        function subtract(a, b) {
            const n = a - b;
            console.log(n);
        }

        //掛け算
        function multiply(a, b) {
            const n = a * b;
            console.log(n);
        }

        //割り算
        function division(a, b) {
            const n = a / b;
            console.log(n);
        }


    </script>
</body>

</html>
