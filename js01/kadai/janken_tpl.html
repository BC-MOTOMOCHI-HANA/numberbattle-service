<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <script src="js/jquery-2.1.3.min.js"></script>
  <!-- <link rel="stylesheet" href="css/sample.css"> -->
  <title>じゃんけん</title>
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: #4f7eff;
      padding: 20px;
      margin: 100px auto;
      width: 500px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
    }

    .modal-content img {
      margin-top: 20px;
      width: 400px;
    }


    .confetti {
      position: absolute;
      top: -10px;
      width: 10px;
      height: 10px;
      animation: confetti-fall 4s ease-in infinite;
    }

    /* カラフルな色をランダムに設定 */
    .confetti:nth-child(1) {
      background: #ff6b6b;
      left: 10%;
      animation-delay: 0s;
    }

    .confetti:nth-child(2) {
      background: #4ecdc4;
      left: 20%;
      animation-delay: 0.3s;
    }

    .confetti:nth-child(3) {
      background: #ffe66d;
      left: 30%;
      animation-delay: 0.6s;
    }

    .confetti:nth-child(4) {
      background: #95e1d3;
      left: 40%;
      animation-delay: 0.9s;
    }

    .confetti:nth-child(5) {
      background: #f38181;
      left: 50%;
      animation-delay: 1.2s;
    }

    .confetti:nth-child(6) {
      background: #aa96da;
      left: 60%;
      animation-delay: 0.4s;
    }

    .confetti:nth-child(7) {
      background: #fcbad3;
      left: 70%;
      animation-delay: 0.7s;
    }

    .confetti:nth-child(8) {
      background: #a8e6cf;
      left: 80%;
      animation-delay: 1s;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg) translateX(0);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh) rotate(720deg) translateX(100px);
        opacity: 0;
      }
    }

    .hidden {
      display: none;
    }


    .snow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .snow {
      position: absolute;
      top: -10px;
      background: rgb(10, 1, 1);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      opacity: 0.8;
      animation: fall linear infinite;
    }

    .snow0 {
      position: absolute;
      top: -10px;
      background: rgb(49, 71, 165);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      opacity: 0.8;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) translateX(0);
      }

      100% {
        transform: translateY(100vh) translateX(50px);
      }
    }

    /* 各雪に異なる位置と速度を設定 */
    .snow:nth-child(1) {
      left: 10%;
      animation-duration: 8s;
    }

    .snow:nth-child(2) {
      left: 20%;
      animation-duration: 10s;
      width: 7px;
      height: 7px;
    }

    .snow:nth-child(3) {
      left: 30%;
      animation-duration: 7s;
      width: 4px;
      height: 4px;
    }

    .snow:nth-child(4) {
      left: 40%;
      animation-duration: 12s;
    }

    .snow:nth-child(5) {
      left: 50%;
      animation-duration: 9s;
      width: 6px;
      height: 6px;
    }

    .snow:nth-child(6) {
      left: 60%;
      animation-duration: 11s;
    }

    .snow:nth-child(7) {
      left: 70%;
      animation-duration: 8s;
      width: 5px;
      height: 5px;
    }

    .snow:nth-child(8) {
      left: 80%;
      animation-duration: 10s;
      width: 7px;
      height: 7px;
    }

    .snow:nth-child(9) {
      left: 90%;
      animation-duration: 9s;
      width: 4px;
      height: 4px;
    }

    .snow:nth-child(10) {
      left: 95%;
      animation-duration: 11s;
    }



    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: -10px;
    }

    div {
      margin: 7px;
    }

    .board2 {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      /* 4列に並べる */
      gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      /* 4列に並べる */
      gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }

    .card {
      width: 80px;
      height: 80px;
      background-color: #3454ac;
      /* 裏面の緑色 */
      color: transparent;
      /* 文字は隠す */
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }

    /* カードがめくられた時、または揃った時のスタイル */
    .card.open {
      background-color: #fff;
      /* 表面は白色 */
      color: #333;
      /* 絵文字を表示 */
      border: 2px solid #333;
      cursor: default;
    }

    .btn {
      background-color: #d1d361;
      color: #ffffff;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.1s;
    }


    .btn:hover {
      background-color: #D40052;
      transform: translateY(-2px);
    }
  </style>

</head>

<body>

  <header>
    <h1>数字バトル</h1>
  </header>

  <main>
    <div id="modal" class="modal">
      <div class="modal-content">
        <span id="modal-close" class="modal-close">×</span>
        <h1>遊び方</h1>
        <h2>5回勝負！・・・3本先取</h2>
        <p>相手より数が多ければ勝ち！</p>
        <p>1度選んだカードは再び使えません</p>
        <p>「１・３・５・７・９」の順番に並んでいます</p>
        <img src="../kadai/img/01.png" alt="">

      </div>
    </div>

    <div id="message" class="hidden">
      </div>

      <div id="message1" class="hidden">
        <div class="snow-container">
          <div class="confetti"></div>
          <div class="confetti"></div>
          <div class="confetti"></div>
          <div class="confetti"></div>
          <div class="confetti"><img
              src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiDItokBzijIzLjNARjURWfJUcXuG5KR7YYDtuzoKJSXiT_lD-REZ5Q6dow5yG78PezowntId_uFwbFsjUab75-UYFRbPftr7xHORYePSxl9DyV9eHdTvICdbubzYZFhmakWnSgHQOIkco/s180-c/valentinesday_cupid.png"
              alt=""></div>
          <div class="confetti"></div>
          <div class="confetti"></div>
          <div class="confetti"></div>
        </div>
      </div>
      <audio id="bgm-audio" src="assets/BGM.mp3" loop preload="auto" hidden></audio>

      <div id="message2" class="hidden">
        <div class="snow-container">
          <div class="snow"><img
              src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg44EYAGTnkSN-MRACJ3MW3_rmq4Uz5Sl1tCd8ZhvMllkIQG4p700vCSnU7shr-8Dwt9xi-Y1qhas5IXSWc6aZmc0iPxxsZlF2goWce4IY9or-0I7JOv63QVnAKROYdizS3O9CtRy4SYxs/s400/warumono.png"
              alt=""></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
          <div class="snow"></div>
        </div>
      </div>

      <audio id="draw1" src="../kadai/assets/draw.mp3"></audio>
      <audio id="win1" src="../kadai/assets/win.mp3"></audio>
      <audio id="loss1" src="../kadai/assets/loss.mp3"></audio>
      <!-- <audio id="draw2" src="../kadai/assets/draw.mp3"></audio> -->
      <audio id="win2" src="../kadai/assets/win2.mp3"></audio>
      <audio id="loss2" src="../kadai/assets/loss2.mp3"></audio>

      <h1 id="stateresult"></h1>
      <h2 id="state">5回勝負！・・・3本先取</h2>

      <div>あいて:<span id="cpu"></span></div>
      <div id="game-board2" class="board"></div>

      <div>あなた:<span id="player"></span></div>
      <div id="game-board" class="board"></div>

      <button class="btn" id="reset">再挑戦</button>

      <div>勝ち:<span id="win">0</span>回</div>
      <div>負け:<span id="lose">0</span>回</div>
      <div>引き分け:<span id="safe">0</span>回</div>
  </main>

  <footer></footer>
  <script>

    document.addEventListener("DOMContentLoaded", function () {
      // sessionStorageにフラグがなければモーダルを表示
      if (!sessionStorage.getItem("modalClosed")) {
        document.getElementById("modal").style.display = "block";
      }

      // 閉じるボタンの処理
      document.getElementById("modal-close").addEventListener("click", function () {
        document.getElementById("modal").style.display = "none";
        // フラグを立てる（このセッションでは再表示されない）
        sessionStorage.setItem("modalClosed", "true");
      });
    });


    const jans = ["1", "3", "5", "7", "9"]
    let cpujans = ["1", "3", "5", "7", "9"]
    let playjan;
    let cpuja;
    let winCount = 0;
    let loseCount = 0;
    let safeCount = 0;
    let round = 0;

    const emojis = ['1️⃣', '3️⃣', '5️⃣', '7️⃣', '9️⃣'];
    const board = document.getElementById('game-board');
    const board2 = document.getElementById('game-board2');

    let cpuCards = [];

    initGame2();
    initGame();

    function initGame() {
      emojis.forEach((emoji, index) => {
        const cardElement = document.createElement('div');
        cardElement.classList.add('card');
        cardElement.dataset.emoji = emoji;
        cardElement.textContent = emoji;
        board.appendChild(cardElement);

        cardElement.addEventListener('click', () => {
          // プレイヤー
          cardElement.classList.add('open');
          player.textContent = jans[index];
          playjan = jans[index];

          // CPU
          openRandomCpuCard();

          result();
        });
      });
    }

    function initGame2() {
      emojis.forEach((emoji) => {
        const cardElement = document.createElement('div');
        cardElement.classList.add('card');
        cardElement.dataset.emoji = emoji;
        cardElement.textContent = emoji;
        board2.appendChild(cardElement);
        cpuCards.push(cardElement);
      });
    }

    function openRandomCpuCard() {

      const availableIndexes = cpuCards
        .map((card, idx) => !card.classList.contains('open') ? idx : null)
        .filter(idx => idx !== null);

      if (availableIndexes.length === 0) return;

      const randomIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];

      cpuCards[randomIndex].classList.add('open');

      cpuja = cpujans[randomIndex];
      cpujans[randomIndex] = null;
      cpu.textContent = cpuja;
    }


    const win2 = document.getElementById('win2');
    const loss2 = document.getElementById('loss2');

    function result() {
      if (playjan === cpuja) {
        round++;
        state.textContent = "引き分け"
        safeCount++;
        safe.textContent = safeCount;
      } else if (playjan > cpuja) {
        round++;
        state.textContent = "勝ち";
        winCount++;
        win.textContent = winCount;
        win2.currentTime = 0;
        win2.play();
      } else {
        round++;
        state.textContent = "負け";
        loseCount++;
        lose.textContent = loseCount;
        loss2.currentTime = 0;
        loss2.play();
      }

      if (round == 5) {
        end()
      }
    }


    const draw1 = document.getElementById('draw1');
    const win1 = document.getElementById('win1');
    const loss1 = document.getElementById('loss1');

    function end() {
      if (winCount == loseCount) {
        stateresult.textContent = "引き分け";
        message.classList.remove("hidden");
        draw1.currentTime = 0;
        draw1.play();
      } else if (winCount > loseCount) {
        stateresult.textContent = "勝ち";
        message1.classList.remove("hidden");
        win1.currentTime = 0;
        win1.play();

      } else if (winCount < loseCount) {
        stateresult.textContent = "負け";
        message2.classList.remove("hidden");
        loss1.currentTime = 0;
        loss1.play();
      }
    }

    reset.addEventListener("click", () => {
      cpujans = ["1", "3", "5", "7", "9"]
      winCount = 0;
      loseCount = 0;
      safeCount = 0;
      round = 0;
      win.textContent = winCount;
      lose.textContent = loseCount;
      safe.textContent = safeCount;
      cpu.textContent = "";
      player.textContent = "";
      state.textContent = "5回勝負！・・・3本先取";
      stateresult.textContent = "";
      cpuCards = [];

      const div2 = document.getElementById("game-board2");
      if (div2.hasChildNodes()) {
        for (let i = div2.childNodes.length - 1; i >= 0; i--) {
          div2.removeChild(div2.childNodes[i]);
        }
      }
      const div1 = document.getElementById("game-board");
      if (div1.hasChildNodes()) {
        for (let i = div1.childNodes.length - 1; i >= 0; i--) {
          div1.removeChild(div1.childNodes[i]);
        }
      }
      initGame2();
      initGame();
    }
    )

  </script>
</body>

</html>
