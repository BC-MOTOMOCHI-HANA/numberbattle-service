<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <script src="js/jquery-2.1.3.min.js"></script>
  <link rel="stylesheet" href="../kadai/css/index.css">
  <title>数字バトル</title>

</head>

<body>

  <header>
    <h1>数字バトル</h1>
  </header>

  <main>
    <div id="modal" class="modal">
      <div class="modal-content">
        <span id="modal-close" class="modal-close">×</span>
        <h1>遊び方</h1>
        <h2>5回勝負！・・・3本先取</h2>
        <p>相手より数が多ければ勝ち！</p>
        <p>1度選んだカードは再び使えません</p>
        <p>「１・３・５・７・９」の順番に並んでいます</p>
        <img src="../kadai/img/01.png" alt="">

      </div>
    </div>

    <div id="message" class="hidden">
    </div>

    <div id="message1" class="hidden">
      <div class="snow-container">
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"><img
            src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiDItokBzijIzLjNARjURWfJUcXuG5KR7YYDtuzoKJSXiT_lD-REZ5Q6dow5yG78PezowntId_uFwbFsjUab75-UYFRbPftr7xHORYePSxl9DyV9eHdTvICdbubzYZFhmakWnSgHQOIkco/s180-c/valentinesday_cupid.png"
            alt=""></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
      </div>
    </div>
    <audio id="bgm-audio" src="assets/BGM.mp3" loop preload="auto" hidden></audio>

    <div id="message2" class="hidden">
      <div class="snow-container">
        <div class="snow"><img
            src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg44EYAGTnkSN-MRACJ3MW3_rmq4Uz5Sl1tCd8ZhvMllkIQG4p700vCSnU7shr-8Dwt9xi-Y1qhas5IXSWc6aZmc0iPxxsZlF2goWce4IY9or-0I7JOv63QVnAKROYdizS3O9CtRy4SYxs/s400/warumono.png"
            alt=""></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
      </div>
    </div>

    <audio id="draw1" src="../kadai/assets/draw.mp3"></audio>
    <audio id="win1" src="../kadai/assets/win.mp3"></audio>
    <audio id="loss1" src="../kadai/assets/loss.mp3"></audio>
    <!-- <audio id="draw2" src="../kadai/assets/draw.mp3"></audio> -->
    <audio id="win2" src="../kadai/assets/win2.mp3"></audio>
    <audio id="loss2" src="../kadai/assets/loss2.mp3"></audio>

    <h1 id="stateresult"></h1>
    <h2 id="state">5回勝負！・・・3本先取</h2>

    <div>あいて:<span id="cpu"></span></div>
    <div id="game-board2" class="board"></div>

    <div>あなた:<span id="player"></span></div>
    <div id="game-board" class="board"></div>

    <button class="btn" id="reset">再挑戦</button>
    <a href="../kadai/localstrage.html" class="btn">履歴</a>

    <div>勝ち:<span id="win">0</span>回</div>
    <div>負け:<span id="lose">0</span>回</div>
    <div>引き分け:<span id="safe">0</span>回</div>
  </main>

  <footer></footer>
  <script>

    document.addEventListener("DOMContentLoaded", function () {
      // sessionStorageにフラグがなければモーダルを表示
      if (!sessionStorage.getItem("modalClosed")) {
        document.getElementById("modal").style.display = "block";
      }

      // 閉じるボタンの処理
      document.getElementById("modal-close").addEventListener("click", function () {
        document.getElementById("modal").style.display = "none";
        // フラグを立てる（このセッションでは再表示されない）
        sessionStorage.setItem("modalClosed", "true");
      });
    });


    const jans = ["1", "3", "5", "7", "9"]
    let cpujans = ["1", "3", "5", "7", "9"]
    let playjan;
    let cpuja;
    let winCount = 0;
    let loseCount = 0;
    let safeCount = 0;
    let round = 0;
    let isGameOver = false;

    const emojis = ['1️⃣', '3️⃣', '5️⃣', '7️⃣', '9️⃣'];
    const board = document.getElementById('game-board');
    const board2 = document.getElementById('game-board2');

    let cpuCards = [];

    initGame2();
    initGame();

    function initGame() {
      emojis.forEach((emoji, index) => {
        const cardElement = document.createElement('div');
        cardElement.classList.add('card');
        cardElement.dataset.emoji = emoji;
        cardElement.textContent = emoji;
        board.appendChild(cardElement);

        cardElement.addEventListener('click', () => {
          // プレイヤー
          if (isGameOver) return;
          if (cardElement.classList.contains('open')) return;
          cardElement.classList.add('open');
          player.textContent = jans[index];
          playjan = jans[index];

          // CPU
          openRandomCpuCard();

          result();
        });
      });
    }

    function initGame2() {
      emojis.forEach((emoji) => {
        const cardElement = document.createElement('div');
        cardElement.classList.add('card');
        cardElement.dataset.emoji = emoji;
        cardElement.textContent = emoji;
        board2.appendChild(cardElement);
        cpuCards.push(cardElement);
      });
    }

    function openRandomCpuCard() {

      const availableIndexes = cpuCards
        .map((card, idx) => !card.classList.contains('open') ? idx : null)
        .filter(idx => idx !== null);

      if (availableIndexes.length === 0) return;

      const randomIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];

      cpuCards[randomIndex].classList.add('open');

      cpuja = cpujans[randomIndex];
      cpujans[randomIndex] = null;
      cpu.textContent = cpuja;
    }


    const win2 = document.getElementById('win2');
    const loss2 = document.getElementById('loss2');

    function result() {
      if (playjan === cpuja) {
        round++;
        state.textContent = "引き分け"
        safeCount++;
        safe.textContent = safeCount;
      } else if (playjan > cpuja) {
        round++;
        state.textContent = "勝ち";
        winCount++;
        win.textContent = winCount;
        win2.currentTime = 0;
        win2.play();
      } else {
        round++;
        state.textContent = "負け";
        loseCount++;
        lose.textContent = loseCount;
        loss2.currentTime = 0;
        loss2.play();
      }

      if (winCount >= 3 || loseCount >= 3 || round == 5) {
        end()
        isGameOver = true;
      }
    }


    const draw1 = document.getElementById('draw1');
    const win1 = document.getElementById('win1');
    const loss1 = document.getElementById('loss1');

    function end() {
      if (winCount == loseCount) {
        stateresult.textContent = "引き分け";
        message.classList.remove("hidden");
        draw1.currentTime = 0;
        draw1.play();
      } else if (winCount > loseCount) {
        stateresult.textContent = "勝ち";
        message1.classList.remove("hidden");
        win1.currentTime = 0;
        win1.play();

      } else if (winCount < loseCount) {
        stateresult.textContent = "負け";
        message2.classList.remove("hidden");
        loss1.currentTime = 0;
        loss1.play();
      }

      saveRecord();
    }

    function saveRecord() {
      const time = new Date().toISOString();
      const result = $('#stateresult').text();
      const win = $('#win').text();
      const lose = $('#lose').text();
      const draw = $('#safe').text();

      const record = { time, result, win, lose, draw };

      const key = 'record_' + Date.now();
      //ユニークなキー名（record_＋現在時刻ミリ秒）を作成
      localStorage.setItem(key, JSON.stringify(record));
      //record を JSON 文字列にして localStorage に保存
      //valueは文字列じゃないとダメ
    }


    reset.addEventListener("click", () => {
      // 状態を初期化する 
      cpujans = ["1", "3", "5", "7", "9"];
      winCount = 0;
      loseCount = 0;
      safeCount = 0;
      round = 0;
      isGameOver = false;

      // 表示をリセット 
      document.getElementById('win').textContent = winCount;
      document.getElementById('lose').textContent = loseCount;
      document.getElementById('safe').textContent = safeCount;
      document.getElementById('cpu').textContent = "";
      document.getElementById('player').textContent = "";
      document.getElementById('state').textContent = "5回勝負！・・・3本先取";
      document.getElementById('stateresult').textContent = "";

      // メッセージ類を非表示に戻す（end() で表示させたものを元へ） 
      const msg = document.getElementById('message');
      const msg1 = document.getElementById('message1');
      const msg2 = document.getElementById('message2');
      if (msg) msg.classList.add('hidden');
      //msg 要素が存在すれば hidden クラスを追加して非表示
      if (msg1) msg1.classList.add('hidden');
      if (msg2) msg2.classList.add('hidden');

      // 音を止める（もし再生中なら） 
      const bgm = document.getElementById('bgm-audio');
      const w1 = document.getElementById('win1');
      const l1 = document.getElementById('loss1');
      const d1 = document.getElementById('draw1');
      if (bgm) {
        bgm.pause();
        bgm.currentTime = 0;
      }
      if (w1) {
        w1.pause();
        w1.currentTime = 0;
      }
      if (l1) {
        l1.pause();
        l1.currentTime = 0;
      }
      if (d1) {
        d1.pause();
        d1.currentTime = 0;
      }

      // 盤面を完全にクリアして再生成 
      cpuCards = []; 
      const div2 = document.getElementById("game-board2");
      while (div2.firstChild) div2.removeChild(div2.firstChild);
      //while(div2.firstChild) は「div2 の中に子ノードがある限り」  
      //div2.firstChild は div2 の「最初の子ノード」を返す    
      
      const div1 = document.getElementById("game-board");
      while (div1.firstChild) div1.removeChild(div1.firstChild);

      // 新たにカードを作る（イベントリスナーもここで再追加される） 
      initGame2();
      initGame();
    }
    );

  </script>
</body>

</html>
