<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase:v9:Chatアプリ</title>
    <link rel="stylesheet" href="../js03/css/index.css">
</head>

<body>

    <!-- コンテンツ表示画面 -->
    <header>
        <h1>mytalk</h1>
    </header>
    <main>

        <div id="output" style="overflow: auto;height: 300px;"></div>
        <div class="send flex-container">
            <textarea id="text" cols="30" rows="1"></textarea>
            <button id="send" class="btn">送信</button>
        </div>

    </main>
    <!--/ コンテンツ表示画面 -->



    <!-- JQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- JQuery -->


    <!--** 以下Firebase **-->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, remove, onChildRemoved }
            from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";    // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB9YWwBTqh_6TtpC2wtwKI2FdpVuYgCUxM",
            authDomain: "test01-68ddd.firebaseapp.com",
            projectId: "test01-68ddd",
            storageBucket: "test01-68ddd.firebasestorage.app",
            messagingSenderId: "1019416384700",
            appId: "1:1019416384700:web:6a1ced25cdbf15b76aacb9"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app); // RealtimeDatabase使う
        const dbRef = ref(db, "chat"); // RealtimeDatabase”chat“を使う

        //送信イベント
        $("#send").on("click", function () {
            const msg = {
                // uname: $("#uname").val(),
                text: $("#text").val()
            }
            // alert(msg.uname + msg.text);
            const newPostRef = push(dbRef);
            set(newPostRef, msg);
        });

        //受信イベント
        onChildAdded(dbRef, function (data) {
            const msg = data.val();
            const key = data.key;

            let h1;
            h1 = `<p class="flex-container-item h1">${msg.text}</p>`

            let h2;
            const messages = [
                "晴れ",
                "曇りのち晴れ",
                "曇り",
                "雨"
            ];
            const randomIndex = Math.floor(Math.random() * messages.length);
            h2 = `<p class="flex-container-item h2">${messages[randomIndex]}</p>`

            let h = '<div class="flex-container">' + h1 + h2 + '</div>';

            $("#output").append(h);
            // $('#output').animate({ scrollTop: $('#output')[0].scrollHeight }, 'fast');
            $('#output').scrollTop($('#output')[0].scrollHeight);
        });




        // let h1 = <p class="msg-user">${escapeHtml(msg.text)}</p>; 
        // let messages = ["晴れ", "曇りのち晴れ", "曇り", "雨"];
        // let rand = Math.floor(Math.random() * messages.length);
        // let h2 = <p class="msg-bot">${messages[rand]}</p>;
        // let h = <div class="flex-container">${h1}${h2}</div>;
        // ("#output").append(h); // 最後の要素を確実に表示
        // ("#output").children().last()[0].scrollIntoView({ behavior: 'smooth', block: 'end' });

    </script>











</body>

</html>
