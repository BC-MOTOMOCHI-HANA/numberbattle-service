<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ほめ褒めちゃっと</title>
    <link rel="stylesheet" href="../kadai/css/index.css">
</head>

<body>

    <!-- コンテンツ表示画面 -->
    <header>
        <h1>ほめ褒めちゃっと</h1>
    </header>
    <main>

        <div id="output" style="overflow: auto;height: 300px;"></div>
        <div class="send flex-container">
            <textarea id="text" cols="30" rows="1"></textarea>
            <button id="send" class="btn">送信</button>
        </div>

    </main>

    <!-- JQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!--** 以下Firebase **-->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, remove, onChildRemoved }
            from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";    // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration


        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app); // RealtimeDatabase使う
        const dbRef = ref(db, "chat"); // RealtimeDatabase”chat“を使う

        //送信イベント
        $("#send").on("click", function () {
            const msg = {
                text: $("#text").val()
            }
            const newPostRef = push(dbRef);
            set(newPostRef, msg);
        });

        //受信イベント
        onChildAdded(dbRef, function (data) {
            const msg = data.val();
            const key = data.key;

            let h1;
            h1 = `<p class="flex-container-item h1">${msg.text}</p>`

            let h2;
            const messages = [
                "いいねそのちょうしでつづけてね！！",
                "びっくりしたけどおもしろかった！！",
                "それなに！もっときかせてほしいね！",
                "さいこうそのはなしもっときかせて！",
                "おもしろいねわらったよありがとう！",
                "なるほどべんきょうになったよまたね",
                "それはすごいそんけいしちゃうわ！！",
                "きょうはいいひになりそうだねっ！！",
                "おもしろいしてんだねかんがえた！！",
                "なるほどねあたらしいはっけんだね！",
                "いいせんすもっとみせてほしいな！！",
                "こころにのこるいいひとことだ！！！",
                "いいねもっとたくさんきかせてよ！！",
                "さいこうだねいっしょにやりたいな！",
                "すごいはっそうだねまねしてみたい！",
                "まいにちちょっとたのしくなりそう！"
            ];
            const randomIndex = Math.floor(Math.random() * messages.length);
            h2 = `<p class="h2">${messages[randomIndex]}</p>`

            let h = '<div>' + '<div class="h1out">' + h1 + '</div>'+ '<br>'+ '<div class="h2out">' + h2 + '</div>'+ '</div>';

            $("#output").append(h);
            $('#output').scrollTop($('#output')[0].scrollHeight);
        });

        //１個だけ削除
        ('#output').on('click', '.h1', function () { (this).remove(); });
        ('#output').on('click', '.h2', function () { (this).remove(); });

    </script>

</body>

</html>
