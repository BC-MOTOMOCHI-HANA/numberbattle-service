<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ほめ褒めちゃっと</title>
    <link rel="stylesheet" href="../kadai/css/index.css">
</head>

<body>

    <!-- コンテンツ表示画面 -->
    <header>
        <h1>ほめ褒めちゃっと</h1>
    </header>
    <main>

        <div id="output" style="overflow: auto;height: 300px;"></div>
        <div class="send flex-container">
            <textarea id="text" cols="30" rows="1"></textarea>
            <button id="send" class="btn">送信</button>
        </div>

    </main>

    <!-- JQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!--** 以下Firebase **-->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, set, update, onChildAdded, onChildChanged, remove, onChildRemoved }
            from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";    // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
 

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app); // RealtimeDatabase使う
        const dbRef = ref(db, "chat"); // RealtimeDatabase”chat“を使う

        const messages = [
            "いいねそのちょうしでつづけてね！！",
            "びっくりしたけどおもしろかった！！",
            "それなに！もっときかせてほしいね！",
            "さいこうそのはなしもっときかせて！",
            "おもしろいねわらったよありがとう！",
            "なるほどべんきょうになったよまたね",
            "それはすごいそんけいしちゃうわ！！",
            "きょうはいいひになりそうだねっ！！",
            "おもしろいしてんだねかんがえた！！",
            "なるほどねあたらしいはっけんだね！",
            "いいせんすもっとみせてほしいな！！",
            "こころにのこるいいひとことだ！！！",
            "いいねもっとたくさんきかせてよ！！",
            "さいこうだねいっしょにやりたいな！",
            "すごいはっそうだねまねしてみたい！",
            "まいにちちょっとたのしくなりそう！"
        ];

        //送信イベント
        $("#send").on("click", function () {
            const text = $("#text").val().trim();
            if (text === "") return; // 空文字チェック

            const msg = { text: text };
            const newPostRef = push(dbRef);
            set(newPostRef, msg);
            $("#text").val(""); // 送信後にフォームをクリア
        });

        //受信イベント
        onChildAdded(dbRef, function (data) {
            const msg = data.val();
            const key = data.key;
            const randomIndex = Math.floor(Math.random() * messages.length);

            const h = `
        <div id="${key}">
            <div class="h1out">
                <p id="${key}_update" class="flex-container-item h1" contenteditable="true">${msg.text}</p>
            </div><br>
            <div class="h2out">
                <p class="h2">${messages[randomIndex]}</p>
            </div>
            <div class="send">
                <button class="remove btn btn-small" data-key="${key}">削除</button>
                <button class="update btn btn-small" data-key="${key}">更新</button>
            </div>
        </div>`;

            $("#output").append(h);
            $('#output').scrollTop($('#output')[0].scrollHeight);
        });

        //削除イベント
        $("#output").on("click", ".remove", function () {
            const key = $(this).attr("data-key");
            const remove_item = ref(db, "chat/" + key);
            remove(remove_item);//Firebaseデータ削除関数
        });

        //更新イベント
        $("#output").on("click", ".update", function () {
            const key = $(this).attr("data-key");
            update(ref(db, "chat/" + key), {
                text: $("#" + key + '_update').text()
            });
        });

        //削除処理がFirebase側で実行されたらイベント発生!
        onChildRemoved(dbRef, (data) => {
            $("#" + data.key).remove();//DOM操作関数(対象を削除)
        });

        //更新処理がFirebase側で実行されたらイベント発生!
        onChildChanged(dbRef, (data) => {
            $("#" + data.key + '_update').html(data.val().text);
            $("#" + data.key + '_update').fadeOut(800).fadeIn(800);
        });
    </script>

</body>

</html>
